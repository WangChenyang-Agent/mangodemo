{% extends "admin_base.html" %}
{% block title %}添加图书{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h4 class="mb-4"><i class="bi bi-plus-lg"></i> 添加图书</h4>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">书名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="price" class="form-label">价格</label>
                            <input type="text" class="form-control" id="price" name="price" placeholder="如 ¥39.00">
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">分类</label>
                            <input type="text" class="form-control" id="category" name="category" placeholder="如 文学、科技">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="src" class="form-label">封面图片 URL</label>
                        <input type="url" class="form-control" id="src" name="src" placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">图书简介</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="stock" class="form-label">库存</label>
                        <input type="number" class="form-control" id="stock" name="stock" value="100" min="0">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> 添加</button>
                        <a href="{{ url_for('admin.books') }}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
